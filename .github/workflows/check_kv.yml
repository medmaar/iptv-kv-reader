name: Check KV State
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/check_kv.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Full KV inventory
        run: |
          DATA=$(curl -s "https://iptv-kv-reader.medmaar.workers.dev")
          python3 -c "
import json,sys
d=json.loads(sys.stdin.read())
print(f\"TOTAL: {len(d)}\")
sites={}
for t in d:
  s=t.get(\'site\',\'unknown\')
  sites[s]=sites.get(s,0)+1
for s,c in sorted(sites.items()):
  print(f\"  {s}: {c}\")
has_phone=sum(1 for t in d if t.get(\'phone\',\'\'))
print(f\"Has phone: {has_phone}/{len(d)}\")
" <<< "$DATA"
          echo "::notice title=SITE_BREAKDOWN::$(echo "$DATA" | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); sites={}; [sites.update({t.get('site','?'): sites.get(t.get('site','?'),0)+1}) for t in d]; print(str(len(d))+' total | '+' | '.join(f'{k}:{v}' for k,v in sorted(sites.items())))")"
