name: Check KV State
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/check_kv.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check KV reader GET
        run: |
          DATA=$(curl -s "https://iptv-kv-reader.medmaar.workers.dev")
          echo "RAW: $DATA" | head -c 600
          echo "$DATA" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print('COUNT:', len(d) if isinstance(d,list) else type(d).__name__); [print(' ENTRY:', t.get('site'), t.get('email'), t.get('phone','')) for t in (d[:10] if isinstance(d,list) else [])]"
      - name: Test /add endpoint
        run: |
          R=$(curl -s -X POST "https://iptv-kv-reader.medmaar.workers.dev/add" -H "Content-Type: application/json" -d "{\"name\":\"GH Test\",\"email\":\"ghtest@debug.com\",\"whatsapp\":\"9999\",\"site\":\"debug\",\"phone\":\"9999\",\"created_at\":1}")
          echo "ADD RESULT: $R"
          AFTER=$(curl -s "https://iptv-kv-reader.medmaar.workers.dev")
          echo "$AFTER" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print('AFTER COUNT:', len(d) if isinstance(d,list) else '?')"
