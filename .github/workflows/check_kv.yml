name: Check KV State
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/check_kv.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch KV state
        run: |
          RAW=$(curl -sv "https://iptv-kv-reader.medmaar.workers.dev" 2>&1)
          echo "CURL OUTPUT: $RAW" | head -50
          DATA=$(curl -s "https://iptv-kv-reader.medmaar.workers.dev")
          echo "$DATA" | python3 -c "
import sys,json
try:
  d=json.load(sys.stdin)
  print('TYPE:', type(d).__name__)
  print('COUNT:', len(d) if isinstance(d,list) else 'N/A')
  for t in (d[:5] if isinstance(d,list) else []):
    print('  ENTRY:', t.get('site'), t.get('email'), t.get('phone',''))
except Exception as e:
  print('ERROR:', e)
  print('RAW:', sys.stdin.read()[:300] if hasattr(sys.stdin,'read') else '?')
"
          echo "$DATA" > kv_state.json
      - name: Commit KV state
        run: |
          git config user.email "mo@momaar.com"
          git config user.name "Mo"
          git add kv_state.json
          git diff --cached --quiet || git commit -m "debug: kv state snapshot" --no-verify
          git push || true
