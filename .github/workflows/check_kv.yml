name: Check KV State
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/check_kv.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check KV State and Annotate
        run: |
          DATA=$(curl -s "https://iptv-kv-reader.medmaar.workers.dev")
          COUNT=$(echo "$DATA" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(len(d) if isinstance(d,list) else -1)")
          ENTRIES=$(echo "$DATA" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); [print(f\"  {t.get(\'site\')}|{t.get(\'email\')}|{t.get(\'phone\',\'\')}\" ) for t in (d[:20] if isinstance(d,list) else [])]" 2>&1 | tr \"\n\" \",\")
          echo "::notice title=KV_COUNT::$COUNT trials in __all_trials__"
          echo "::notice title=KV_ENTRIES::$ENTRIES"
          ADD_R=$(curl -s -X POST "https://iptv-kv-reader.medmaar.workers.dev/add" -H "Content-Type: application/json" -d "{\"name\":\"GH Test\",\"email\":\"ghtest999@debug.com\",\"whatsapp\":\"88888\",\"site\":\"debug\",\"phone\":\"88888\",\"created_at\":1}")
          AFTER=$(curl -s "https://iptv-kv-reader.medmaar.workers.dev" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(len(d) if isinstance(d,list) else -1)")
          echo "::notice title=AFTER_ADD::add_result=$ADD_R after_count=$AFTER"
