name: KV Check
on:
  push:
    branches: [main]
    paths: ['.github/workflows/kv_check.yml']
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check hihosey767 and current count
        run: |
          DATA=$(curl -sf "https://iptv-kv-reader.medmaar.workers.dev")
          COUNT=$(echo "$DATA" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(len(d))" 2>/dev/null)
          FOUND=$(echo "$DATA" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); hits=[t for t in d if 'hihosey767' in (t.get('email') or '')]; print(len(hits),'found:',hits[:2])" 2>/dev/null)
          echo "::notice title=KV_COUNT::total=$COUNT"
          echo "::notice title=HIHOSEY::$FOUND"
      - name: Test /add directly for missing email
        run: |
          R=$(curl -sf -X POST "https://iptv-kv-reader.medmaar.workers.dev/add" -H "Content-Type: application/json" -d "{\"email\":\"hihosey767@jctoto.com\",\"whatsapp\":\"\",\"phone\":\"\",\"site\":\"manual-check\",\"name\":\"\",\"created_at\":$(date +%s)000}")
          echo "::notice title=ADD_RESULT::$R"
