name: Build Keys Index
on:
  push:
    branches: [main]
    paths: ['.github/workflows/build_keys.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Populate __keys__ index for all 9 namespaces
        run: |
          R=$(curl -sf -X POST "https://iptv-kv-reader.medmaar.workers.dev/build-keys" 2>&1) || R="CURL_FAILED: $R"
          echo "::notice title=BUILD_RESULT::$R"
      - name: Verify dashboard returns data
        run: |
          D=$(curl -sf "https://iptv-kv-reader.medmaar.workers.dev")
          C=$(echo "$D" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(len(d))" 2>/dev/null || echo "error")
          echo "::notice title=TRIAL_COUNT::$C trials visible in dashboard"
