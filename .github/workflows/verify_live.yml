name: Verify Live Reader
on:
  push:
    branches: [main]
    paths: ['.github/workflows/verify_live.yml']
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check live KV reader
        run: |
          DATA=$(curl -sf "https://iptv-kv-reader.medmaar.workers.dev")
          COUNT=$(echo "$DATA" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(len(d))" 2>/dev/null)
          HATAP=$(echo "$DATA" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); h=[t for t in d if 'hatap' in (t.get('email') or '')]; print(len(h),'found:', h)" 2>/dev/null)
          SITES=$(echo "$DATA" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); s={}; [s.update({t.get('site','?'):s.get(t.get('site','?'),0)+1}) for t in d]; print(dict(sorted(s.items())))" 2>/dev/null)
          echo "::notice title=TOTAL::count=$COUNT"
          echo "::notice title=HATAP::$HATAP"
          echo "::notice title=SITES::$SITES"
