name: Debug KV State
on:
  push:
    branches: [main]
    paths: ['.github/workflows/debug_kv.yml']
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: GET current state
        run: |
          DATA=$(curl -sf "https://iptv-kv-reader.medmaar.workers.dev" 2>&1) || DATA="CURL_FAILED: $?"
          COUNT=$(echo "$DATA" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(len(d))" 2>/dev/null || echo "PARSE_FAIL")
          echo "::notice title=GET_COUNT::count=$COUNT raw_start=${DATA:0:100}"
      - name: POST test entry
        run: |
          R=$(curl -sf -X POST "https://iptv-kv-reader.medmaar.workers.dev/add" \
            -H "Content-Type: application/json" \
            -d '{"name":"Test","email":"debug2@x.com","whatsapp":"111","site":"test","phone":"111","created_at":1}' 2>&1) || R="CURL_FAILED"
          echo "::notice title=ADD_RESULT::$R"
      - name: GET after add
        run: |
          DATA2=$(curl -sf "https://iptv-kv-reader.medmaar.workers.dev") || DATA2="FAIL"
          C2=$(echo "$DATA2" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(len(d))" 2>/dev/null || echo "PARSE_FAIL")
          echo "::notice title=AFTER_ADD::count=$C2"
